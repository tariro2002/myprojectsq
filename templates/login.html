<!DOCTYPE html><html><head><title>Login</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial;background:#f5f0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;}.card{background:white;border-radius:12px;padding:40px;width:100%;max-width:400px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}.logo{text-align:center;margin-bottom:24px;}.logo h1{color:#6a0dad;font-size:24px;}.logo p{color:#666;font-size:14px;}p{margin-bottom:16px;}label{display:block;font-weight:bold;color:#6a0dad;font-size:14px;margin-bottom:6px;}input{width:100%;padding:10px 14px;border:2px solid #f0e0ff;border-radius:8px;font-size:14px;outline:none;}.btn{background:#6a0dad;color:white;padding:12px 28px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;margin-top:8px;}.error{background:#fff0f0;color:#cc0000;padding:10px;border-radius:8px;margin-bottom:16px;font-size:14px;}</style></head><body><div class="card"><div class="logo"><h1>Zimbabwe Property Registry</h1><p>Please log in to continue</p></div>{% if form.errors %}<div class="error">Wrong username or password.</div>{% endif %}<form method="POST">{% csrf_token %}{{form.as_p}}<button type="submit" class="btn">Login</button></form></div></body></html>
