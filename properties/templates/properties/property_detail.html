<!DOCTYPE html>
<html>
<head>
    <title>Property Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f0ff; min-height: 100vh; }

        .navbar {
            background: #6a0dad;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(233,30,140,0.3);
        }
        .navbar h1 { color: white; font-size: 22px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }

        .container { padding: 40px; max-width: 700px; margin: 0 auto; }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #6a0dad, #9b4dca);
            padding: 24px;
            color: white;
        }
        .card-header h2 { font-size: 22px; }
        .card-header p { font-size: 14px; opacity: 0.9; margin-top: 4px; }

        .card-body { padding: 24px; }

        .field {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f0e0ff;
        }
        .field:last-child { border-bottom: none; }
        .label { font-weight: bold; color: #6a0dad; font-size: 14px; }
        .value { color: #333; font-size: 14px; }

        .badge {
            background: #f0e0ff;
            color: #6a0dad;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #6a0dad;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover { color: #4a0080; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>🏠 Zimbabwe Property Registry</h1>
        <a href="/admin">Admin Panel</a>
    </div>

    <div class="container">

        <div class="card">
            <div class="card-header">
                <h2>{{ property.address }}</h2>
                <p>Property Details</p>
            </div>
            <div class="card-body">
                <div class="field">
                    <span class="label">Owner</span>
                    <span class="value">{{ property.owner_name }}</span>
                </div>
                <div class="field">
                    <span class="label">Size</span>
                    <span class="value">{{ property.size }} sqm</span>
                </div>
                <div class="field">
                    <span class="label">Type</span>
                    <span class="value"><span class="badge">{{ property.property_type }}</span></span>
                </div>
                <div class="field">
                    <span class="label">Date Registered</span>
                    <span class="value">{{ property.date_registered }}</span>
                </div>
            </div>
        </div>

        <a href="/properties/" class="back-link">← Back to all properties</a>

    </div>

</body>
</html>
