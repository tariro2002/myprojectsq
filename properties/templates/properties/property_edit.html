<!DOCTYPE html>
<html>
<head>
    <title>Edit Property</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f0ff; min-height: 100vh; }

        .navbar {
            background: #6a0dad;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(106,13,173,0.3);
        }
        .navbar h1 { color: white; font-size: 22px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }

        .container { padding: 40px; max-width: 600px; margin: 0 auto; }

        h2 { color: #6a0dad; margin-bottom: 24px; font-size: 24px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        p { margin-bottom: 16px; }
        label {
            display: block;
            font-weight: bold;
            color: #6a0dad;
            font-size: 14px;
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #f0e0ff;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus { border-color: #6a0dad; }

        .btn {
            background: #6a0dad;
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(106,13,173,0.3);
        }
        .btn:hover { background: #4a0080; }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #6a0dad;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover { color: #4a0080; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>🏠 Zimbabwe Property Registry</h1>
        <a href="/admin">Admin Panel</a>
    </div>

    <div class="container">
        <h2>✏️ Edit Property</h2>
        <p style="color:#666; margin-bottom: 20px;">Editing: <strong>{{ property.address }}</strong></p>

        <div class="card">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn">💾 Save Changes</button>
            </form>
        </div>

        <a href="/properties/" class="back-link">← Back to all properties</a>
    </div>

</body>
</html>
